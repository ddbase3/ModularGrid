<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>ModularGrid Demo - Plugin Stack</title>
	<link rel="stylesheet" href="../../src/styles/modulargrid.css">
	<style>
		body {
			margin: 16px;
			font-family: Inter, system-ui, sans-serif;
			color: #222;
		}

		h1 {
			margin: 0 0 8px 0;
			font-size: 24px;
			line-height: 1.2;
			font-weight: 600;
		}

		p {
			margin: 0 0 16px 0;
			max-width: 960px;
			color: #555;
			line-height: 1.45;
		}

		.workspace-shell {
			max-width: 1320px;
		}

		.workspace-top-row,
		.workspace-bottom-row {
			display: grid;
			gap: 8px;
			align-items: end;
		}

		.workspace-top-row {
			grid-template-columns: minmax(260px, 1fr) auto auto auto;
		}

		.workspace-bottom-row {
			grid-template-columns: 1fr auto;
			align-items: center;
		}

		.workspace-zone {
			min-width: 0;
		}

		.workspace-zone--inline {
			display: flex;
			flex-wrap: wrap;
			gap: 6px;
			align-items: center;
			justify-content: flex-end;
			min-width: 0;
		}

		.workspace-zone--inline > * {
			width: auto;
		}

		.workspace-grid .mg-control-group {
			min-width: 0;
		}

		.workspace-grid .mg-input,
		.workspace-grid .mg-select,
		.workspace-grid .mg-button {
			min-height: 30px;
		}

		.demo-log {
			margin-top: 16px;
			padding-top: 8px;
			border-top: 1px solid #e2e2e2;
			font-size: 13px;
			color: #555;
		}

		.demo-log strong {
			color: #222;
		}

		@media (max-width: 980px) {
			.workspace-top-row,
			.workspace-bottom-row {
				grid-template-columns: 1fr;
			}

			.workspace-zone--inline {
				justify-content: flex-start;
			}
		}

		@media (max-width: 720px) {
			body {
				margin: 12px;
			}

			h1 {
				font-size: 21px;
			}
		}
	</style>
</head>
<body>
	<div class="workspace-shell">
		<h1>ModularGrid - Plugin Stack Demo</h1>
		<p>
			This demo intentionally composes many features through plugins and configuration instead of custom grid code:
			search, paging, page size, column visibility, selection, bulk actions, exports, summaries, row detail,
			view switching and responsive cards.
		</p>

		<div class="workspace-grid">
			<div id="plugin-stack-grid"></div>
			<div id="plugin-stack-log" class="demo-log"></div>
		</div>
	</div>

	<script type="module" src="./plugin-stack.js"></script>
</body>
</html>
