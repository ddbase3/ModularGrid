<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>ModularGrid Demo - Modern Layout</title>
	<link rel="stylesheet" href="../../src/styles/modulargrid.css">
	<style>
		body {
			margin: 0;
			padding: 32px;
			font-family: Inter, system-ui, sans-serif;
			background:
				radial-gradient(circle at top left, rgba(95, 120, 255, 0.12), transparent 35%),
				linear-gradient(180deg, #f5f7ff 0%, #eef2f9 100%);
			color: #172033;
		}

		h1 {
			margin: 0 0 10px 0;
			font-size: 32px;
		}

		p {
			margin: 0 0 24px 0;
			color: #50607a;
			max-width: 760px;
		}

		.demo-shell {
			max-width: 1280px;
		}

		.modern-grid {
			background: rgba(255, 255, 255, 0.82);
			backdrop-filter: blur(10px);
			border: 1px solid rgba(255, 255, 255, 0.7);
			border-radius: 24px;
			padding: 20px;
			box-shadow: 0 20px 50px rgba(24, 39, 75, 0.08);
		}

		.modern-top-row,
		.modern-bottom-row {
			display: grid;
			grid-template-columns: minmax(280px, 1.4fr) minmax(220px, 1fr) minmax(240px, 1fr);
			gap: 14px;
			align-items: stretch;
		}

		.modern-bottom-row {
			grid-template-columns: minmax(220px, 1fr) minmax(220px, auto);
		}

		.modern-zone {
			display: flex;
			align-items: stretch;
			min-width: 0;
		}

		.modern-zone > * {
			width: 100%;
		}

		.modern-panel {
			background: #ffffff;
			border: 1px solid #e6ebf5;
			border-radius: 18px;
			padding: 14px;
			box-shadow: 0 8px 20px rgba(24, 39, 75, 0.04);
		}

		.modern-panel--search .mg-control-group,
		.modern-panel--meta .mg-control-group {
			min-width: 0;
		}

		.modern-panel--actions {
			display: flex;
			justify-content: flex-end;
			align-items: center;
			gap: 10px;
			flex-wrap: wrap;
		}

		.modern-panel--actions > * {
			width: auto;
		}

		.modern-panel--selection {
			display: flex;
			justify-content: flex-start;
			align-items: center;
		}

		.modern-table-shell {
			background: #ffffff;
			border: 1px solid #e6ebf5;
			border-radius: 22px;
			padding: 12px;
			overflow: hidden;
			box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
		}

		.modern-table-shell .mg-table {
			border: 0;
		}

		.modern-table-shell .mg-table th {
			background: #f6f8fc;
		}

		.modern-table-shell .mg-table th,
		.modern-table-shell .mg-table td {
			border-bottom: 1px solid #edf1f7;
		}

		.modern-grid .mg-input,
		.modern-grid .mg-select,
		.modern-grid .mg-button {
			border-radius: 12px;
			border-color: #d9e2f0;
		}

		.modern-grid .mg-button {
			background: #ffffff;
		}

		.modern-grid .mg-button:hover {
			background: #f7f9fd;
		}

		.modern-grid .mg-info,
		.modern-grid .mg-pager-label,
		.modern-grid .mg-selection-label {
			color: #32415d;
		}

		@media (max-width: 980px) {
			.modern-top-row,
			.modern-bottom-row {
				grid-template-columns: 1fr;
			}
		}
	</style>
</head>
<body>
	<div class="demo-shell">
		<h1>ModularGrid - Modern Layout Demo</h1>
		<p>
			This example keeps the core layout-neutral and uses only demo-specific CSS plus named zones
			to build a more polished control area around the table.
		</p>

		<div class="modern-grid">
			<div id="modern-grid"></div>
		</div>
	</div>

	<script type="module" src="./modern-layout.js"></script>
</body>
</html>
